services:
  mysql:
    image: mysql:8.0
    container_name: nazrice-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "sql@123"
      MYSQL_DATABASE: product_manager
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
